services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: goalcert
      POSTGRES_PASSWORD: goalcert
      POSTGRES_DB: goalcert
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U goalcert"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./backend
    environment:
      GOALCERT_DATABASE_URL: postgresql+psycopg://goalcert:goalcert@db:5432/goalcert
      GOALCERT_CORS_ORIGINS: '["http://localhost:8080"]'
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  web:
    build: ./frontend
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  pgdata:
